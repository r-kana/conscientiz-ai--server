services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conscientiz-ai-server
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - app-network
    command: ${COMMAND}
    
networks:
  app-network:
    driver: bridge